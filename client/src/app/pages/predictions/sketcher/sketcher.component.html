<div class="sketcher-container">
  <iframe 
    #ketcherFrame
    [src]="ketcherSrc"
    class="ketcher-iframe"
    title="Molecular Sketcher"
  ></iframe>
  
  <div class="sketcher-actions">
    <button class="btn-primary" (click)="submitMolecule()" [disabled]="!hasValidMolecule">
      <svg viewBox="0 0 24 24" fill="currentColor">
        <path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/>
      </svg>
      Predict
    </button>
    <p class="sketcher-hint">
      Draw or paste a molecule above, then click Predict
    </p>
  </div>
</div>
