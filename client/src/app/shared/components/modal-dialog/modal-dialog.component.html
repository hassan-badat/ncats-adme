@if (open) {
  <div class="modal-backdrop" (click)="onBackdropClick($event)">
    <div class="modal-container" role="dialog" [attr.aria-label]="title">
      <div class="modal-header">
        <h2 class="modal-title">{{ title }}</h2>
        <button class="modal-close" (click)="close()" aria-label="Close dialog">
          <svg viewBox="0 0 24 24" fill="currentColor">
            <path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/>
          </svg>
        </button>
      </div>
      
      <div class="modal-body">
        <ng-content />
      </div>
      
      @if (showFooter) {
        <div class="modal-footer">
          <button class="btn-secondary" (click)="close()">{{ cancelLabel }}</button>
          <button class="btn-primary" (click)="confirm()">{{ confirmLabel }}</button>
        </div>
      }
    </div>
  </div>
}
